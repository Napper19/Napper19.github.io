<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Pagina non trovata | Davide Nappo</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060b;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .container-404 {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    .glitch-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 1rem;
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(6, 182, 212, 0.5)); }
    }

    .msg-404 {
      font-size: 1.2rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }

    .submsg-404 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: #475569;
      margin-bottom: 2.5rem;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
    }

    /* Background orbs */
    .orb-404 {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }

    .orb-404:nth-child(1) {
      width: 400px; height: 400px;
      background: #7c3aed;
      top: -100px; left: -100px;
      animation: float-orb 8s ease-in-out infinite;
    }

    .orb-404:nth-child(2) {
      width: 300px; height: 300px;
      background: #06b6d4;
      bottom: -80px; right: -80px;
      animation: float-orb 10s ease-in-out infinite reverse;
    }

    @keyframes float-orb {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }
  </style>
</head>
<body>
  <div class="orb-404"></div>
  <div class="orb-404"></div>

  <div class="container-404">
    <div class="glitch-code">404</div>
    <p class="msg-404">Questa pagina non esiste.</p>
    <p class="submsg-404">Error: page_not_found — the void stares back.</p>
    <a href="/" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Torna alla Home
    </a>
  </div>
</body>
</html>
